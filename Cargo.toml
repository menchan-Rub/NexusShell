[package]
name = "parser"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "parser"
path = "src/lib.rs"

[dependencies]
# パーサー関連
nom = "7.1"
logos = "0.13"
tree-sitter = "0.20"

# エラー処理
thiserror = "1.0"
anyhow = "1.0"

# 非同期処理
tokio = { version = "1.28", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# データ構造
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dashmap = "5.4"
indexmap = "1.9"

# ロギング
tracing = "0.1"
log = "0.4"

# ユーティリティ
once_cell = "1.18"
regex = "1.8"
itertools = "0.10"

[dev-dependencies]
criterion = "0.5"
proptest = "1.1"
test-case = "3.1"
mockall = "0.11"
